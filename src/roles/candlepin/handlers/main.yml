---
- name: Restart candlepin
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  ansible.builtin.shell: |
    systemctl --user stop candlepin.service || true
    systemctl --user start candlepin.service
  args:
    executable: /bin/bash

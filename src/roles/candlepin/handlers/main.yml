---
# Single-task handler so "Restart candlepin" is always found (block handlers can
# fail to register in some contexts, e.g. upgrade playbook). Diagnostics on
# startup failure remain in candlepin role task rescue block.
- name: Restart candlepin
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  ansible.builtin.systemd:
    name: candlepin
    state: restarted
    scope: user

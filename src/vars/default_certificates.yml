---
certificates_ca_directory: /var/lib/foremanctl/certificates
ca_key_password: "{{ certificates_ca_directory }}/private/ca.pwd"
ca_certificate: "{{ certificates_ca_directory }}/certs/ca.crt"
ca_key: "{{ certificates_ca_directory }}/private/ca.key"
server_certificate: "{{ certificates_ca_directory }}/certs/{{ ansible_facts['fqdn'] }}.crt"
server_key: "{{ certificates_ca_directory }}/private/{{ ansible_facts['fqdn'] }}.key"
server_ca_certificate: "{{ certificates_ca_directory }}/certs/ca.crt"
client_certificate: "{{ certificates_ca_directory }}/certs/{{ ansible_facts['fqdn'] }}-client.crt"
client_key: "{{ certificates_ca_directory }}/private/{{ ansible_facts['fqdn'] }}-client.key"
client_ca_certificate: "{{ certificates_ca_directory }}/certs/ca.crt"
localhost_key: "{{ certificates_ca_directory }}/private/iop-core-gateway.key"
localhost_certificate: "{{ certificates_ca_directory }}/certs/iop-core-gateway.crt"
localhost_client_key: "{{ certificates_ca_directory }}/private/iop-core-gateway-client.key"
localhost_client_certificate: "{{ certificates_ca_directory }}/certs/iop-core-gateway-client.crt"
candlepin_key: "{{ certificates_ca_directory }}/private/candlepin.key"
candlepin_certificate: "{{ certificates_ca_directory }}/certs/candlepin.crt"

# IOP Gateway certificate paths - uses localhost certs to match puppet-iop behavior
iop_gateway_server_certificate: "{{ certificates_ca_directory }}/certs/iop-core-gateway.crt"
iop_gateway_server_key: "{{ certificates_ca_directory }}/private/iop-core-gateway.key"
iop_gateway_server_ca_certificate: "{{ certificates_ca_directory }}/certs/ca.crt"
iop_gateway_client_certificate: "{{ certificates_ca_directory }}/certs/iop-core-gateway-client.crt"
iop_gateway_client_key: "{{ certificates_ca_directory }}/private/iop-core-gateway-client.key"
iop_gateway_client_ca_certificate: "{{ certificates_ca_directory }}/certs/ca.crt"

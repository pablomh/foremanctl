---
certificates_ca: true
certificates_ca_directory: /var/lib/foremanctl/certificates

# Owner for generated certificate files. Defaults to root so the role works
# in playbooks that do not load base.yaml (e.g. the remote-database playbook).
# Overridden to foremanctl in base.yaml for the main deployment.
certificates_owner: "{{ foremanctl_user | default('root') }}"
certificates_group: "{{ foremanctl_group | default('root') }}"
certificates_ca_directory_keys: "{{ certificates_ca_directory }}/private"
certificates_ca_directory_certs: "{{ certificates_ca_directory }}/certs"
certificates_ca_directory_requests: "{{ certificates_ca_directory }}/requests"
certificates_cnames: []
certificates_algorithm_type: RSA
certificates_algorithm_size: 4096

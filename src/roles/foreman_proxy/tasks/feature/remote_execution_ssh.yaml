---
- name: Create SSH key and secrets as rootless user
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  block:
    - name: Create SSH Key
      community.crypto.openssh_keypair:
        path: "{{ foremanctl_home }}/foreman-proxy-ssh"
        mode: '0600'

    - name: Create SSH Key podman secret
      containers.podman.podman_secret:
        state: present
        name: foreman_proxy-remote_execution_ssh-id_rsa_foreman_proxy
        path: "{{ foremanctl_home }}/foreman-proxy-ssh"
      notify:
        - Restart Foreman Proxy
        - Refresh Foreman Proxy

    - name: Create SSH Pub podman secret
      containers.podman.podman_secret:
        state: present
        name: foreman_proxy-remote_execution_ssh-id_rsa_foreman_proxy-pub
        path: "{{ foremanctl_home }}/foreman-proxy-ssh.pub"
      notify:
        - Restart Foreman Proxy
        - Refresh Foreman Proxy

    - name: Mount SSH secrets via container.d drop-in
      ansible.builtin.copy:
        dest: "{{ foremanctl_quadlet_dir }}/foreman-proxy.container.d/remote_execution_ssh-keys.conf"
        owner: "{{ foremanctl_user }}"
        group: "{{ foremanctl_group }}"
        mode: '0644'
        content: |
          [Container]
          Secret=foreman_proxy-remote_execution_ssh-id_rsa_foreman_proxy,type=mount,target=/usr/share/foreman-proxy/.ssh/id_rsa_foreman_proxy
          Secret=foreman_proxy-remote_execution_ssh-id_rsa_foreman_proxy-pub,type=mount,target=/usr/share/foreman-proxy/.ssh/id_rsa_foreman_proxy.pub
      notify:
        - Restart Foreman Proxy
        - Refresh Foreman Proxy

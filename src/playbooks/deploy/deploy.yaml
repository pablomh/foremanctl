---
- name: Setup rootless user environment
  hosts:
    - quadlet
  become: true
  roles:
    - role: rootless_user
  tasks:
    - name: Map rootless_user_xdg_runtime_dir to foremanctl namespace
      ansible.builtin.set_fact:
        foremanctl_xdg_runtime_dir: "{{ rootless_user_xdg_runtime_dir }}"

- name: Deploy Foreman services
  hosts:
    - quadlet
  become: true
  vars_files:
    - "../../vars/defaults.yml"
    - "../../vars/flavors/{{ flavor }}.yml"
    - "../../vars/{{ certificate_source }}_certificates.yml"
    - "../../vars/images.yml"
    - "../../vars/tuning/{{ tuning }}.yml"
    - "../../vars/database.yml"
    - "../../vars/foreman.yml"
    - "../../vars/base.yaml"
  pre_tasks:
    - name: Make /root directory traversable for rootless user
      when: "certificate_source == 'installer'"
      become: true
      ansible.builtin.file:
        path: /root
        state: directory
        mode: '0711'

    - name: Make installer certificate directories readable by rootless user
      when: "certificate_source == 'installer'"
      become: true
      ansible.builtin.command:
        cmd: find /root/ssl-build -type d -exec chmod 0755 {} +
      changed_when: false

    - name: Make installer certificate files readable by rootless user
      when: "certificate_source == 'installer'"
      become: true
      ansible.builtin.command:
        cmd: find /root/ssl-build -type f -exec chmod 0644 {} +
      changed_when: false

    - name: Add iop databases
      when:
        - "'iop' in enabled_features"
        - database_mode == 'internal'
      block:
        - name: Include iop databases
          ansible.builtin.include_vars:
            file: "../../vars/database_iop.yml"

        - name: Combine lists
          ansible.builtin.set_fact:
            postgresql_databases: "{{ postgresql_databases + iop_postgresql_databases }}"
            postgresql_users: "{{ postgresql_users + iop_postgresql_users }}"

  roles:
    - role: pre_install
    - role: checks
    - role: certificates
      when: "certificate_source == 'default'"
    - role: certificate_checks
      vars:
        certificate_checks_certificate: "{{ server_certificate }}"
        certificate_checks_key: "{{ server_key }}"
        certificate_checks_ca: "{{ ca_certificate }}"
    - role: deploy_network
      vars:
        deploy_network_name: foreman-db
        deploy_network_internal: true
        deploy_network_isolate: true
    - role: deploy_network
      vars:
        deploy_network_name: foreman-cache
        deploy_network_internal: true
        deploy_network_isolate: true
    - role: deploy_network
      vars:
        deploy_network_name: foreman-app
    - role: deploy_network
      vars:
        deploy_network_name: foreman-proxy-net
    - role: postgresql
      when:
        - database_mode == 'internal'
    - redis
    - candlepin
    - httpd
    - pulp
    - foreman
    - role: systemd_target
    - role: iop_core
      when:
        - "'iop' in enabled_features"
        - database_mode == 'internal'
    - role: foreman_proxy
      when:
        - "'foreman-proxy' in enabled_features"
    - role: hammer
      when:
        - "'hammer' in enabled_features"
    - post_install

---
postgresql_container_image: quay.io/sclorg/postgresql-16-c10s
postgresql_container_tag: "latest"
postgresql_container_name: postgresql
# Default to host networking so the role works out-of-the-box in rootful
# contexts (development, external DB) without requiring bridge networks.
# The rootless deployment overrides this via the postgresql role call in
# deploy.yaml to attach the container to the foreman-db bridge network.
postgresql_networks: host

# Host directory that PostgreSQL data is stored in
postgresql_data_dir: /var/lib/pgsql/data

# postgresql_socket_dir: undefined by default
# Set in the deploy playbook for internal DB deployments to expose a Unix
# socket on the host for IOP containers and Ansible community.postgresql tasks.
# Not set for external DB deployments (TCP access via login_host: localhost).

# Container UID/GID for the postgres process (used for podman unshare chown)
postgresql_container_uid: 26
postgresql_container_gid: 26

postgresql_admin_password: "CHANGEME"

postgresql_max_connections: 500
postgresql_shared_buffers: 512MB
postgresql_effective_cache_size: 1GB

# Systemd scope for service management.
# 'system' default keeps the role self-contained for rootful deployments.
# The rootless deployment (deploy.yaml) overrides this to 'user'.
postgresql_systemd_scope: system

# Rootful fallback values for foremanctl_* variables.
# These are overridden for rootless deployments when base.yaml is loaded
# (vars_files has higher precedence than role defaults).
foremanctl_user: root
foremanctl_group: root
foremanctl_home: /root
foremanctl_quadlet_dir: /etc/containers/systemd
foremanctl_become_method: sudo
foremanctl_registry_auth_file: /etc/foreman/registry-auth.json
foremanctl_runtime_env:
  REGISTRY_AUTH_FILE: /etc/foreman/registry-auth.json

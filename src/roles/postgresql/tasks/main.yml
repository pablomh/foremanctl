---
- name: Create PostgreSQL storage directory
  ansible.builtin.file:
    path: "{{ postgresql_data_dir }}"
    state: directory
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: "0700"

- name: Create PostgreSQL socket directory
  ansible.builtin.file:
    path: "{{ postgresql_socket_dir }}"
    state: directory
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: "0777"

- name: Set PostgreSQL data directory ownership for container UID/GID
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  ansible.builtin.command:
    cmd: "podman unshare chown -R {{ postgresql_container_uid }}:{{ postgresql_container_gid }} {{ postgresql_data_dir }}"
  changed_when: true

- name: Configure PostgreSQL container as rootless user
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  block:
    - name: Pull PostgreSQL container image
      containers.podman.podman_image:
        name: "{{ postgresql_container_image }}:{{ postgresql_container_tag }}"
        state: present

    - name: Create Podman secret for PostgreSQL admin password
      containers.podman.podman_secret:
        name: postgresql-admin-password
        data: "{{ postgresql_admin_password }}"
      notify:
        - Restart postgresql

    - name: Deploy PostgreSQL container
      containers.podman.podman_container:
        name: "{{ postgresql_container_name }}"
        image: "{{ postgresql_container_image }}:{{ postgresql_container_tag }}"
        state: quadlet
        healthcheck: pg_isready
        sdnotify: healthy
        network: "{{ postgresql_network }}"
        volumes:
          - "{{ postgresql_data_dir }}:/var/lib/pgsql/data:Z"
          - "{{ postgresql_socket_dir }}:/tmp/socket:z"
        secrets:
          - 'postgresql-admin-password,target=POSTGRESQL_ADMIN_PASSWORD,type=env'
        env:
          POSTGRESQL_MAX_CONNECTIONS: "{{ postgresql_max_connections }}"
          POSTGRESQL_SHARED_BUFFERS: "{{ postgresql_shared_buffers }}"
          POSTGRESQL_EFFECTIVE_CACHE_SIZE: "{{ postgresql_effective_cache_size }}"
          POSTGRESQL_LISTEN_ADDRESSES: "*"
        quadlet_options:
          - |
            [Install]
            WantedBy=default.target foreman.target
            [Unit]
            PartOf=foreman.target

    - name: Run daemon reload
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: Flush handlers to restart services
      ansible.builtin.meta: flush_handlers

    - name: Start the PostgreSQL Service
      ansible.builtin.systemd:
        name: "{{ postgresql_container_name }}"
        state: started
        scope: user

# On first startup PostgreSQL only listens on /var/run/postgresql inside the
# container; the bind-mounted socket dir is not yet in unix_socket_directories.
# Use podman exec to reach the container-internal socket and configure it.
# After the restart triggered by the notify, /tmp/socket (= postgresql_socket_dir
# on the host) becomes available so subsequent community.postgresql tasks can
# connect via the host-side socket path.
- name: Check current unix_socket_directories setting
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  ansible.builtin.command:
    cmd: >-
      podman exec {{ postgresql_container_name }}
      psql -U postgres -tAc
      "SELECT setting FROM pg_settings WHERE name='unix_socket_directories'"
  register: postgresql_current_socket_dirs
  changed_when: false

- name: Configure unix_socket_directories to include the bind-mounted path
  when: "'/tmp/socket' not in postgresql_current_socket_dirs.stdout"
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  ansible.builtin.command:
    cmd: >-
      podman exec {{ postgresql_container_name }}
      psql -U postgres -c
      "ALTER SYSTEM SET unix_socket_directories = '/var/run/postgresql,/tmp/socket'"
  changed_when: true
  notify:
    - Restart postgresql

- name: Flush handlers to apply socket configuration
  ansible.builtin.meta: flush_handlers

- name: Wait for PostgreSQL service to be healthy
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  ansible.builtin.systemd:
    name: "{{ postgresql_container_name }}"
    state: started
    scope: user
  retries: 30
  delay: 2
  register: _postgresql_service_status
  until: _postgresql_service_status is successful

- name: Check if pg_hba.conf already allows network connections
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  ansible.builtin.command:
    cmd: >-
      podman exec {{ postgresql_container_name }}
      grep -q 'host all all 0.0.0.0/0 scram-sha-256' /var/lib/pgsql/data/pg_hba.conf
  register: _postgresql_pg_hba_check
  changed_when: false
  failed_when: false

- name: Configure pg_hba.conf to allow network connections
  when: _postgresql_pg_hba_check.rc != 0
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  ansible.builtin.command:
    cmd: >-
      podman exec {{ postgresql_container_name }}
      bash -c "sed -i '1i host all all 0.0.0.0/0 scram-sha-256' /var/lib/pgsql/data/pg_hba.conf"
  changed_when: true
  notify:
    - Restart postgresql

- name: Flush handlers to apply pg_hba configuration
  ansible.builtin.meta: flush_handlers

# SCRAM-SHA-256 is default for PostgreSQL 14+,
# after the upgrade, we can drop this task.
- name: Use scram-sha-256 for password encryption
  community.postgresql.postgresql_set:
    login_user: postgres
    login_unix_socket: "{{ postgresql_socket_dir }}"
    name: password_encryption
    value: "scram-sha-256"
  notify:
    - Restart postgresql

- name: Flush handlers to apply password encryption change
  ansible.builtin.meta: flush_handlers

- name: Create PostgreSQL users
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    login_user: postgres
    login_unix_socket: "{{ postgresql_socket_dir }}"
    role_attr_flags: "{{ item.role_attr_flags | default(omit) }}"
    state: present
  loop: "{{ postgresql_users }}"
  no_log: true

- name: Create PostgreSQL databases
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner }}"
    login_user: postgres
    login_unix_socket: "{{ postgresql_socket_dir }}"
    state: present
  loop: "{{ postgresql_databases }}"

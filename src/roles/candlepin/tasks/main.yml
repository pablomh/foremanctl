---
- name: Create log directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0755'
  loop:
    - /var/log/candlepin
    - /var/log/tomcat

- name: Configure certificates
  ansible.builtin.include_tasks:
    file: certs.yml

- name: Configure Candlepin container as rootless user
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  block:
    - name: Create Candlepin configuration
      containers.podman.podman_secret:
        state: present
        name: candlepin-candlepin-conf
        data: "{{ lookup('ansible.builtin.template', 'candlepin.conf.j2') }}"
        labels:
          filename: candlepin.conf
          app: candlepin
      notify:
        - Restart candlepin

    - name: Create Tomcat server.xml
      containers.podman.podman_secret:
        state: present
        name: candlepin-tomcat-server-xml
        data: "{{ lookup('ansible.builtin.template', 'server.xml.j2') }}"
        labels:
          filename: server.xml
          app: tomcat
      notify:
        - Restart candlepin

    - name: Create Tomcat server configuration
      containers.podman.podman_secret:
        state: present
        name: candlepin-tomcat-conf
        data: "{{ lookup('ansible.builtin.template', 'tomcat.conf') }}"
        labels:
          filename: tomcat.conf
          app: tomcat
      notify:
        - Restart candlepin

    - name: Setup artemis
      ansible.builtin.include_tasks:
        file: artemis.yml

    - name: Pull the Candlepin container image
      containers.podman.podman_image:
        name: "{{ candlepin_container_image }}:{{ candlepin_container_tag }}"
        state: present

    - name: Deploy Candlepin quadlet
      containers.podman.podman_container:
        name: "candlepin"
        image: "{{ candlepin_container_image }}:{{ candlepin_container_tag }}"
        state: quadlet
        network: "{{ candlepin_networks }}"
        hostname: "{{ ansible_facts['fqdn'] }}"
        secrets:
          - 'candlepin-ca-cert,target=/etc/candlepin/certs/candlepin-ca.crt,mode=0440,type=mount'
          - 'candlepin-ca-key,target=/etc/candlepin/certs/candlepin-ca.key,mode=0440,type=mount'
          - 'candlepin-tomcat-keystore,target=/etc/candlepin/certs/keystore,mode=0440,type=mount'
          - 'candlepin-tomcat-truststore,target=/etc/candlepin/certs/truststore,mode=0440,type=mount'
          - 'candlepin-candlepin-conf,target=/etc/candlepin/candlepin.conf,mode=0440,type=mount'
          - 'candlepin-artemis-broker-xml,target=/etc/candlepin/broker.xml,mode=440,type=mount'
          - 'candlepin-tomcat-server-xml,target=/etc/tomcat/server.xml,mode=440,type=mount'
          - 'candlepin-tomcat-conf,target=/etc/tomcat/tomcat.conf,mode=440,type=mount'
          - 'candlepin-artemis-login-config,target=/etc/tomcat/login.config,mode=440,type=mount'
          - 'candlepin-artemis-cert-roles-properties,target=/etc/tomcat/cert-roles.properties,mode=440,type=mount'
          - 'candlepin-artemis-cert-users-properties,target=/etc/tomcat/cert-users.properties,mode=440,type=mount'
          - 'candlepin-artemis-jaas-conf,target=/etc/tomcat/conf.d/jaas.conf,mode=440,type=mount'
        volumes:
          - /var/log/candlepin:/var/log/candlepin:Z
          - /var/log/tomcat:/var/log/tomcat:Z
        quadlet_options:
          - |
            [Install]
            WantedBy=default.target foreman.target
            [Unit]
            PartOf=foreman.target
            Wants=redis.service postgresql.service
            After=redis.service postgresql.service
            [Service]
            TimeoutStartSec=300
        healthcheck: curl --fail --cacert /etc/candlepin/certs/candlepin-ca.crt --resolve candlepin:23443:127.0.0.1 https://candlepin:23443/candlepin/status
        sdnotify: healthy

    - name: Run daemon reload to make Quadlet create the service files
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    # Pinpoint: verify DB is reachable from the same network context Candlepin will use
    # (host-side nc to "postgresql" does not resolve when using bridge networks)
    # Only applicable when using bridge networks, not host networking
    - name: DEBUG - Test PostgreSQL reachability from Candlepin network (pre-start)
      when:
        - database_mode == 'internal'
        - candlepin_networks is iterable
        - candlepin_networks is not string
      ansible.builtin.command:
        cmd: >-
          podman run --rm
          {{ candlepin_networks | map('regex_replace', '^', '--network ') | join(' ') | trim }}
          {{ postgresql_container_image }}:{{ postgresql_container_tag }}
          pg_isready -h {{ candlepin_database_host }} -p {{ candlepin_database_port }} -U postgres
      register: _candlepin_pg_prestart_test
      changed_when: false
      failed_when: false

    - name: DEBUG - Display PostgreSQL pre-start reachability
      when:
        - database_mode == 'internal'
        - candlepin_networks is iterable
        - candlepin_networks is not string
      ansible.builtin.debug:
        msg: >-
          PostgreSQL reachability from Candlepin network ({{ candlepin_networks }}):
          {{ 'SUCCESS' if _candlepin_pg_prestart_test.rc == 0 else 'FAILED' }}
          {{ (_candlepin_pg_prestart_test.stderr_lines + _candlepin_pg_prestart_test.stdout_lines) | default([]) }}

    - name: Start the Candlepin Service with debugging
      block:
        - name: Start the Candlepin Service
          ansible.builtin.systemd:
            name: candlepin
            state: started
            scope: user
      rescue:
        - name: DEBUG - Get candlepin service status
          ansible.builtin.systemd:
            name: candlepin
            scope: user
          register: _candlepin_status
          failed_when: false

        - name: DEBUG - Display candlepin service status
          ansible.builtin.debug:
            msg: "{{ _candlepin_status }}"

        - name: DEBUG - Get candlepin journal logs
          ansible.builtin.command:
            cmd: journalctl --user -u candlepin.service -n 200 --no-pager -o short-iso
          register: _candlepin_logs
          failed_when: false
          changed_when: false

        - name: DEBUG - Display candlepin journal logs
          ansible.builtin.debug:
            msg: "{{ ((_candlepin_logs.stdout_lines | default([])) + (_candlepin_logs.stderr_lines | default([]))) or ['(no journal output)'] }}"

        - name: DEBUG - Get Podman error from journal (exit 125 etc.)
          ansible.builtin.shell:
            cmd: set -o pipefail && journalctl --user -b -n 500 --no-pager -o short-iso 2>&1 | grep -E -i 'candlepin|podman|125|error|failed' || true
          register: _candlepin_podman_journal
          failed_when: false
          changed_when: false

        - name: DEBUG - Display Podman/candlepin-related journal lines
          ansible.builtin.debug:
            msg: "{{ _candlepin_podman_journal.stdout_lines | default([], true) or ['(no matching journal lines)'] }}"

        - name: DEBUG - Get candlepin container logs (if container existed)
          ansible.builtin.command:
            cmd: podman logs candlepin --tail 100
          register: _candlepin_container_logs
          failed_when: false
          changed_when: false

        - name: DEBUG - Display candlepin container logs
          ansible.builtin.debug:
            msg: >-
              {{ ((_candlepin_container_logs.stdout_lines | default([]))
              + (_candlepin_container_logs.stderr_lines | default([])))
              or ['(container already removed or no output)'] }}

        # Run from container on Candlepin networks so "postgresql" hostname resolves
        # Only applicable when using bridge networks, not host networking
        - name: DEBUG - Test PostgreSQL TCP from Candlepin network (rescue)
          when:
            - database_mode == 'internal'
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.command:
            cmd: >-
              podman run --rm
              {{ candlepin_networks | map('regex_replace', '^', '--network ') | join(' ') | trim }}
              {{ postgresql_container_image }}:{{ postgresql_container_tag }}
              pg_isready -h {{ candlepin_database_host }} -p {{ candlepin_database_port }} -U postgres
          register: _candlepin_pg_rescue_test
          failed_when: false
          changed_when: false

        - name: DEBUG - Display PostgreSQL TCP test (rescue)
          when:
            - database_mode == 'internal'
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.debug:
            msg: >-
              PostgreSQL from Candlepin network (rescue):
              {{ 'SUCCESS' if _candlepin_pg_rescue_test.rc == 0 else 'FAILED' }}
              {{ (_candlepin_pg_rescue_test.stderr_lines + _candlepin_pg_rescue_test.stdout_lines) | default([]) }}

        - name: Re-raise the failure
          ansible.builtin.fail:
            msg: "Candlepin service failed to start"

    - name: Flush handlers to apply configuration changes
      ansible.builtin.meta: flush_handlers

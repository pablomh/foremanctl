---
- name: Create PostgreSQL storage directory
  ansible.builtin.file:
    path: "{{ postgresql_data_dir }}"
    state: directory
    owner: "{{ foremanctl_user | default(postgresql_container_uid) }}"
    group: "{{ foremanctl_group | default(postgresql_container_gid) }}"
    mode: "0700"
    setype: container_var_lib_t

- name: Create PostgreSQL socket directory
  when: postgresql_networks != 'host'
  ansible.builtin.file:
    path: "{{ postgresql_socket_dir }}"
    state: directory
    owner: "{{ foremanctl_user | default('root') }}"
    group: "{{ foremanctl_group | default('root') }}"
    mode: "0777"

- name: Configure and start PostgreSQL container as rootless user
  become: true
  become_method: "{{ foremanctl_become_method | default('sudo') }}"
  become_user: "{{ foremanctl_user | default('root') }}"
  environment: "{{ foremanctl_runtime_env | default({}) }}"
  block:
    - name: Set PostgreSQL data directory ownership for container UID/GID
      when: postgresql_systemd_scope == 'user'
      ansible.builtin.command:
        cmd: "podman unshare chown -R {{ postgresql_container_uid }}:{{ postgresql_container_gid }} {{ postgresql_data_dir }}"
      changed_when: true

    - name: Pull PostgreSQL container image
      containers.podman.podman_image:
        name: "{{ postgresql_container_image }}:{{ postgresql_container_tag }}"
        state: present

    - name: Create Podman secret for PostgreSQL admin password
      containers.podman.podman_secret:
        name: postgresql-admin-password
        data: "{{ postgresql_admin_password }}"
      notify:
        - Restart postgresql

    - name: Deploy PostgreSQL container
      containers.podman.podman_container:
        name: "{{ postgresql_container_name }}"
        image: "{{ postgresql_container_image }}:{{ postgresql_container_tag }}"
        state: quadlet
        healthcheck: pg_isready
        sdnotify: healthy
        network: "{{ postgresql_networks }}"
        volumes: >-
          {{ [postgresql_data_dir + ':/var/lib/pgsql/data:z'] +
             ([postgresql_socket_dir + ':/tmp/socket:z'] if postgresql_networks != 'host' else []) }}
        secrets:
          - 'postgresql-admin-password,target=POSTGRESQL_ADMIN_PASSWORD,type=env'
        env:
          POSTGRESQL_MAX_CONNECTIONS: "{{ postgresql_max_connections }}"
          POSTGRESQL_SHARED_BUFFERS: "{{ postgresql_shared_buffers }}"
          POSTGRESQL_EFFECTIVE_CACHE_SIZE: "{{ postgresql_effective_cache_size }}"
          POSTGRESQL_LISTEN_ADDRESSES: "*"
        quadlet_options:
          - |
            [Install]
            WantedBy=default.target foreman.target
            [Unit]
            PartOf=foreman.target
            [Service]
            TimeoutStartSec=300

    - name: Run daemon reload
      ansible.builtin.systemd:
        daemon_reload: true
        scope: "{{ postgresql_systemd_scope }}"

    - name: Start the PostgreSQL service
      ansible.builtin.systemd:
        name: "{{ postgresql_container_name }}"
        state: started
        scope: "{{ postgresql_systemd_scope }}"

    - name: Flush handlers to restart if secrets changed
      ansible.builtin.meta: flush_handlers

# On first startup the sclorg container only listens on the container-internal
# /var/run/postgresql socket. Configure unix_socket_directories to also expose
# /tmp/socket (the bind-mounted host-side path) so that Ansible community.postgresql
# tasks and IOP services can connect via postgresql_socket_dir on the host.
# On first startup PostgreSQL only listens on /var/run/postgresql inside the
# container. The bind-mounted socket dir is not yet in unix_socket_directories.
# Use podman exec to reach the container-internal socket and configure it via
# ALTER SYSTEM. After the restart triggered by the notify, /tmp/socket (the
# host-side bind-mount) becomes available so subsequent community.postgresql
# tasks can connect via postgresql_socket_dir.
- name: Configure unix_socket_directories to expose the bind-mounted socket path
  when: postgresql_networks != 'host'
  block:
    - name: Check current unix_socket_directories setting
      become: true
      become_method: "{{ foremanctl_become_method }}"
      become_user: "{{ foremanctl_user }}"
      environment: "{{ foremanctl_runtime_env }}"
      ansible.builtin.command:
        cmd: >-
          podman exec {{ postgresql_container_name }}
          psql -U postgres -tAc
          "SELECT setting FROM pg_settings WHERE name='unix_socket_directories'"
      register: _postgresql_socket_dirs
      changed_when: false

    - name: Configure unix_socket_directories to include the bind-mounted path
      when: "'/tmp/socket' not in _postgresql_socket_dirs.stdout"
      become: true
      become_method: "{{ foremanctl_become_method }}"
      become_user: "{{ foremanctl_user }}"
      environment: "{{ foremanctl_runtime_env }}"
      ansible.builtin.command:
        cmd: >-
          podman exec {{ postgresql_container_name }}
          psql -U postgres -c
          "ALTER SYSTEM SET unix_socket_directories = '/var/run/postgresql,/tmp/socket'"
      changed_when: true
      notify:
        - Restart postgresql

    - name: Flush handlers to apply socket configuration
      ansible.builtin.meta: flush_handlers

- name: Wait for PostgreSQL container to be healthy after socket reconfiguration
  when:
    - postgresql_networks != 'host'
    - "'/tmp/socket' not in (_postgresql_socket_dirs.stdout | default(''))"
  become: true
  become_method: "{{ foremanctl_become_method | default('sudo') }}"
  become_user: "{{ foremanctl_user | default('root') }}"
  environment: "{{ foremanctl_runtime_env | default({}) }}"
  ansible.builtin.command:
    cmd: podman healthcheck run {{ postgresql_container_name }}
  retries: 30
  delay: 2
  register: _postgresql_healthcheck
  until: _postgresql_healthcheck.rc == 0
  changed_when: false

- name: Create PostgreSQL users
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    login_user: postgres
    login_unix_socket: "{{ postgresql_socket_dir if postgresql_networks != 'host' else omit }}"
    login_host: "{{ 'localhost' if postgresql_networks == 'host' else omit }}"
    role_attr_flags: "{{ item.role_attr_flags | default(omit) }}"
    state: present
  loop: "{{ postgresql_users }}"
  no_log: true

- name: Create PostgreSQL databases
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner }}"
    login_user: postgres
    login_unix_socket: "{{ postgresql_socket_dir if postgresql_networks != 'host' else omit }}"
    login_host: "{{ 'localhost' if postgresql_networks == 'host' else omit }}"
    state: present
  loop: "{{ postgresql_databases }}"

- name: Configure SSL certificates
  when:
    - postgresql_ssl_crt is defined
    - postgresql_ssl_crt != ''
    - postgresql_ssl_key is defined
    - postgresql_ssl_key != ''
  become: true
  become_method: "{{ foremanctl_become_method | default('sudo') }}"
  become_user: "{{ foremanctl_user | default('root') }}"
  environment: "{{ foremanctl_runtime_env | default({}) }}"
  block:
    - name: Create Podman secret for PostgreSQL SSL cert
      containers.podman.podman_secret:
        name: postgresql-ssl-crt
        path: "{{ postgresql_ssl_crt }}"
      notify:
        - Restart postgresql

    - name: Create Podman secret for PostgreSQL SSL key
      containers.podman.podman_secret:
        name: postgresql-ssl-key
        path: "{{ postgresql_ssl_key }}"
      notify:
        - Restart postgresql

    - name: Create Podman secret for PostgreSQL SSL config
      containers.podman.podman_secret:
        name: postgresql-ssl-conf
        data: |
          ssl = on
          ssl_cert_file = '/opt/app-root/src/certs/ssl.crt'
          ssl_key_file =  '/opt/app-root/src/certs/ssl.key'
      notify:
        - Restart postgresql

    - name: Create postgresql.container.d folder
      ansible.builtin.file:
        path: "{{ foremanctl_quadlet_dir | default('/etc/containers/systemd') }}/postgresql.container.d"
        state: directory
        mode: '0755'
        owner: "{{ foremanctl_user }}"
        group: "{{ foremanctl_group }}"

    - name: Configure PostgreSQL SSL-related secrets
      ansible.builtin.copy:
        dest: "{{ foremanctl_quadlet_dir | default('/etc/containers/systemd') }}/postgresql.container.d/ssl.conf"
        mode: '0644'
        owner: "{{ foremanctl_user }}"
        group: "{{ foremanctl_group }}"
        content: |
          [Container]
          Secret=postgresql-ssl-crt,type=mount,target=/opt/app-root/src/certs/ssl.crt,mode=0640
          Secret=postgresql-ssl-key,type=mount,target=/opt/app-root/src/certs/ssl.key,mode=0640
          Secret=postgresql-ssl-conf,type=mount,target=/opt/app-root/src/postgresql-cfg/ssl.conf
      notify:
        - Restart postgresql

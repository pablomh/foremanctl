---
# This file runs as ROOT to copy certificate files from the foremanctl
# certificates directory to /var/lib/foremanctl/tmp/ where the foremanctl
# user can read them to create Podman secrets.
- name: Create temporary directory for certificates
  ansible.builtin.file:
    path: "/var/lib/{{ foremanctl_user }}/tmp"
    state: directory
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0755'

- name: Copy IOP Gateway server certificate to temporary directory
  ansible.builtin.copy:
    src: "{{ iop_gateway_server_certificate }}"
    dest: "/var/lib/{{ foremanctl_user }}/tmp/iop-gateway-server-cert.pem"
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0644'
    remote_src: true

- name: Copy IOP Gateway server key to temporary directory
  ansible.builtin.copy:
    src: "{{ iop_gateway_server_key }}"
    dest: "/var/lib/{{ foremanctl_user }}/tmp/iop-gateway-server-key.pem"
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0600'
    remote_src: true

- name: Copy IOP Gateway server CA certificate to temporary directory
  ansible.builtin.copy:
    src: "{{ iop_gateway_server_ca_certificate }}"
    dest: "/var/lib/{{ foremanctl_user }}/tmp/iop-gateway-server-ca-cert.pem"
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0644'
    remote_src: true

- name: Copy IOP Gateway client certificate to temporary directory
  ansible.builtin.copy:
    src: "{{ iop_gateway_client_certificate }}"
    dest: "/var/lib/{{ foremanctl_user }}/tmp/iop-gateway-client-cert.pem"
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0644'
    remote_src: true

- name: Copy IOP Gateway client key to temporary directory
  ansible.builtin.copy:
    src: "{{ iop_gateway_client_key }}"
    dest: "/var/lib/{{ foremanctl_user }}/tmp/iop-gateway-client-key.pem"
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0600'
    remote_src: true

- name: Copy IOP Gateway client CA certificate to temporary directory
  ansible.builtin.copy:
    src: "{{ iop_gateway_client_ca_certificate }}"
    dest: "/var/lib/{{ foremanctl_user }}/tmp/iop-gateway-client-ca-cert.pem"
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0644'
    remote_src: true

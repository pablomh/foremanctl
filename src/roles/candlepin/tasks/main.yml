---
- name: Create log directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0755'
  loop:
    - /var/log/candlepin
    - /var/log/tomcat

- name: Prepare certificates (as root to access /root/ files)
  ansible.builtin.include_tasks:
    file: certs_prepare.yml

- name: Configure Candlepin container as rootless user
  become: true
  become_method: "{{ foremanctl_become_method }}"
  become_user: "{{ foremanctl_user }}"
  environment: "{{ foremanctl_runtime_env }}"
  block:
    - name: Create certificate secrets (as foremanctl for correct Podman context)
      ansible.builtin.include_tasks:
        file: certs_secrets.yml
    - name: Create Candlepin configuration
      containers.podman.podman_secret:
        state: present
        name: candlepin-candlepin-conf
        data: "{{ lookup('ansible.builtin.template', 'candlepin.conf.j2') }}"
        labels:
          filename: candlepin.conf
          app: candlepin
      notify:
        - Restart candlepin

    - name: Create Tomcat server.xml
      containers.podman.podman_secret:
        state: present
        name: candlepin-tomcat-server-xml
        data: "{{ lookup('ansible.builtin.template', 'server.xml.j2') }}"
        labels:
          filename: server.xml
          app: tomcat
      notify:
        - Restart candlepin

    - name: Create Tomcat server configuration
      containers.podman.podman_secret:
        state: present
        name: candlepin-tomcat-conf
        data: "{{ lookup('ansible.builtin.template', 'tomcat.conf') }}"
        labels:
          filename: tomcat.conf
          app: tomcat
      notify:
        - Restart candlepin

    - name: Setup artemis
      ansible.builtin.include_tasks:
        file: artemis.yml

    - name: Pull the Candlepin container image
      containers.podman.podman_image:
        name: "{{ candlepin_container_image }}:{{ candlepin_container_tag }}"
        state: present

    - name: Deploy Candlepin quadlet
      containers.podman.podman_container:
        name: "candlepin"
        image: "{{ candlepin_container_image }}:{{ candlepin_container_tag }}"
        state: quadlet
        network: "{{ candlepin_networks }}"
        hostname: "{{ ansible_facts['fqdn'] }}"
        secrets:
          - 'candlepin-ca-cert,target=/etc/candlepin/certs/candlepin-ca.crt,mode=0440,type=mount'
          - 'candlepin-ca-key,target=/etc/candlepin/certs/candlepin-ca.key,mode=0440,type=mount'
          - 'candlepin-tomcat-keystore,target=/etc/candlepin/certs/keystore,mode=0440,type=mount'
          - 'candlepin-tomcat-truststore,target=/etc/candlepin/certs/truststore,mode=0440,type=mount'
          - 'candlepin-candlepin-conf,target=/etc/candlepin/candlepin.conf,mode=0440,type=mount'
          - 'candlepin-artemis-broker-xml,target=/etc/candlepin/broker.xml,mode=440,type=mount'
          - 'candlepin-tomcat-server-xml,target=/etc/tomcat/server.xml,mode=440,type=mount'
          - 'candlepin-tomcat-conf,target=/etc/tomcat/tomcat.conf,mode=440,type=mount'
          - 'candlepin-artemis-login-config,target=/etc/tomcat/login.config,mode=440,type=mount'
          - 'candlepin-artemis-cert-roles-properties,target=/etc/tomcat/cert-roles.properties,mode=440,type=mount'
          - 'candlepin-artemis-cert-users-properties,target=/etc/tomcat/cert-users.properties,mode=440,type=mount'
          - 'candlepin-artemis-jaas-conf,target=/etc/tomcat/conf.d/jaas.conf,mode=440,type=mount'
        volumes:
          - /var/log/candlepin:/var/log/candlepin:Z
          - /var/log/tomcat:/var/log/tomcat:Z
        quadlet_options:
          - |
            [Install]
            WantedBy=default.target foreman.target
            [Unit]
            PartOf=foreman.target
            Wants=redis.service postgresql.service
            After=redis.service postgresql.service
            [Service]
            TimeoutStartSec=300
        healthcheck: curl --fail --cacert /etc/candlepin/certs/candlepin-ca.crt --resolve candlepin:23443:127.0.0.1 https://candlepin:23443/candlepin/status
        sdnotify: healthy

    - name: Run daemon reload to make Quadlet create the service files
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    # Pinpoint: verify DB is reachable from the same network context Candlepin will use
    # (host-side nc to "postgresql" does not resolve when using bridge networks)
    # Only applicable when using bridge networks, not host networking
    - name: DEBUG - Test PostgreSQL reachability from Candlepin network (pre-start)
      when:
        - database_mode == 'internal'
        - candlepin_networks is iterable
        - candlepin_networks is not string
      ansible.builtin.command:
        cmd: >-
          podman run --rm
          {{ candlepin_networks | map('regex_replace', '^', '--network ') | join(' ') | trim }}
          {{ postgresql_container_image }}:{{ postgresql_container_tag }}
          pg_isready -h {{ candlepin_database_host }} -p {{ candlepin_database_port }} -U postgres
      register: _candlepin_pg_prestart_test
      changed_when: false
      failed_when: false

    - name: DEBUG - Display PostgreSQL pre-start reachability
      when:
        - database_mode == 'internal'
        - candlepin_networks is iterable
        - candlepin_networks is not string
      ansible.builtin.debug:
        msg: >-
          PostgreSQL reachability from Candlepin network ({{ candlepin_networks }}):
          {{ 'SUCCESS' if _candlepin_pg_prestart_test.rc == 0 else 'FAILED' }}
          {{ (_candlepin_pg_prestart_test.stderr_lines + _candlepin_pg_prestart_test.stdout_lines) | default([]) }}

    - name: Start the Candlepin Service with debugging
      block:
        - name: Start the Candlepin Service
          ansible.builtin.systemd:
            name: candlepin
            state: started
            scope: user
      rescue:
        - name: DEBUG - Get candlepin service status
          ansible.builtin.systemd:
            name: candlepin
            scope: user
          register: _candlepin_status
          failed_when: false

        - name: DEBUG - Display candlepin service status
          ansible.builtin.debug:
            msg: "{{ _candlepin_status }}"

        - name: DEBUG - Get candlepin journal logs (as current user)
          ansible.builtin.command:
            cmd: journalctl --user -u candlepin.service -n 200 --no-pager -o short-iso
          register: _candlepin_logs
          failed_when: false
          changed_when: false

        - name: DEBUG - Get candlepin journal as root (user often lacks journal read)
          become: true
          become_user: root
          ansible.builtin.shell:
            cmd: |
              USER_UID=$(id -u "{{ foremanctl_user }}")
              runuser -u "{{ foremanctl_user }}" -- env XDG_RUNTIME_DIR=/run/user/$USER_UID \
                journalctl --user -u candlepin.service -n 200 --no-pager -o short-iso
          args:
            executable: /bin/bash
          register: _candlepin_journal_root
          failed_when: false
          changed_when: false

        # Fallback: read user journal dir as root (CI often blocks runuser journal read)
        - name: DEBUG - Get user journal via root reading journal dir
          become: true
          become_user: root
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              USER_UID=$(id -u "{{ foremanctl_user }}")
              JDIR="/run/user/$USER_UID/journal"
              if [ -d "$JDIR" ]; then
                journalctl -D "$JDIR" -n 200 --no-pager -o short-iso 2>/dev/null | tail -100
              else
                echo "(journal dir $JDIR not found)"
              fi
          args:
            executable: /bin/bash
          register: _candlepin_journal_dir
          failed_when: false
          changed_when: false

        - name: DEBUG - Display candlepin journal logs (root or user)
          ansible.builtin.debug:
            msg: >-
              {{ (((_candlepin_journal_root.stdout_lines | default([]))
              + (_candlepin_journal_root.stderr_lines | default([])))
              or ((_candlepin_journal_dir.stdout_lines | default([]))
                  + (_candlepin_journal_dir.stderr_lines | default([])))
              or ((_candlepin_logs.stdout_lines | default([]))
                  + (_candlepin_logs.stderr_lines | default([])))
              or ['(no journal output)']) }}

        - name: DEBUG - Get Podman error from journal (exit 125 etc.)
          ansible.builtin.shell:
            cmd: |
              set -o pipefail
              journalctl --user -b -n 500 --no-pager -o short-iso 2>&1 |
              grep -E -i 'candlepin|podman|125|error|failed' || true
          args:
            executable: /bin/bash
          register: _candlepin_podman_journal
          failed_when: false
          changed_when: false

        - name: DEBUG - Display Podman/candlepin-related journal lines
          ansible.builtin.debug:
            msg: >-
              {{ _candlepin_podman_journal.stdout_lines | default([], true)
              or ['(no matching journal lines)'] }}

        # Minimal run (image + networks only) to see if Podman 125 is from networks/image
        # vs secrets/volumes/health/sdnotify
        - name: DEBUG - Minimal podman run (image + Candlepin networks only)
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.command:
            cmd: >-
              podman run --rm
              {{ candlepin_networks | map('regex_replace', '^', '--network ') | join(' ') | trim }}
              {{ candlepin_container_image }}:{{ candlepin_container_tag }}
              sh -c "exit 0"
          register: _candlepin_minimal_run
          failed_when: false
          changed_when: false

        - name: DEBUG - Display minimal podman run result
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.debug:
            msg: >-
              Minimal podman run rc={{ _candlepin_minimal_run.rc }}:
              {{ (_candlepin_minimal_run.stderr_lines | default([]))
              + (_candlepin_minimal_run.stdout_lines | default([]))
              or ['(no output)'] }}

        # Test with volumes added
        - name: DEBUG - Test podman run with volumes (networks + volumes)
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.command:
            cmd: >-
              podman run --rm
              {{ candlepin_networks | map('regex_replace', '^', '--network ') | join(' ') | trim }}
              -v /var/log/candlepin:/var/log/candlepin:Z
              -v /var/log/tomcat:/var/log/tomcat:Z
              {{ candlepin_container_image }}:{{ candlepin_container_tag }}
              sh -c "exit 0"
          register: _candlepin_volumes_test
          failed_when: false
          changed_when: false

        - name: DEBUG - Display volume test result
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.debug:
            msg: >-
              Volumes test rc={{ _candlepin_volumes_test.rc }}:
              {{ (_candlepin_volumes_test.stderr_lines | default([]))
              + (_candlepin_volumes_test.stdout_lines | default([]))
              or ['(no output)'] }}

        # Test with one secret added
        - name: DEBUG - Test podman run with one secret (networks + volumes + 1 secret)
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.command:
            cmd: >-
              podman run --rm
              {{ candlepin_networks | map('regex_replace', '^', '--network ') | join(' ') | trim }}
              -v /var/log/candlepin:/var/log/candlepin:Z
              -v /var/log/tomcat:/var/log/tomcat:Z
              --secret candlepin-candlepin-conf,target=/etc/candlepin/candlepin.conf,mode=0440,type=mount
              {{ candlepin_container_image }}:{{ candlepin_container_tag }}
              sh -c "exit 0"
          register: _candlepin_secret_test
          failed_when: false
          changed_when: false

        - name: DEBUG - Display secret test result
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.debug:
            msg: >-
              Secret test rc={{ _candlepin_secret_test.rc }}:
              {{ (_candlepin_secret_test.stderr_lines | default([]))
              + (_candlepin_secret_test.stdout_lines | default([]))
              or ['(no output)'] }}

        # Test with ALL secrets (no healthcheck/sdnotify)
        - name: DEBUG - Test podman run with ALL secrets (no healthcheck)
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.command:
            cmd: >-
              podman run --rm
              {{ candlepin_networks | map('regex_replace', '^', '--network ') | join(' ') | trim }}
              -v /var/log/candlepin:/var/log/candlepin:Z
              -v /var/log/tomcat:/var/log/tomcat:Z
              --secret candlepin-ca-cert,target=/etc/candlepin/certs/candlepin-ca.crt,mode=0440,type=mount
              --secret candlepin-ca-key,target=/etc/candlepin/certs/candlepin-ca.key,mode=0440,type=mount
              --secret candlepin-tomcat-keystore,target=/etc/candlepin/certs/keystore,mode=0440,type=mount
              --secret candlepin-tomcat-truststore,target=/etc/candlepin/certs/truststore,mode=0440,type=mount
              --secret candlepin-candlepin-conf,target=/etc/candlepin/candlepin.conf,mode=0440,type=mount
              --secret candlepin-artemis-broker-xml,target=/etc/candlepin/broker.xml,mode=440,type=mount
              --secret candlepin-tomcat-server-xml,target=/etc/tomcat/server.xml,mode=440,type=mount
              --secret candlepin-tomcat-conf,target=/etc/tomcat/tomcat.conf,mode=440,type=mount
              --secret candlepin-artemis-login-config,target=/etc/tomcat/login.config,mode=440,type=mount
              --secret candlepin-artemis-cert-roles-properties,target=/etc/tomcat/cert-roles.properties,mode=440,type=mount
              --secret candlepin-artemis-cert-users-properties,target=/etc/tomcat/cert-users.properties,mode=440,type=mount
              --secret candlepin-artemis-jaas-conf,target=/etc/tomcat/conf.d/jaas.conf,mode=440,type=mount
              {{ candlepin_container_image }}:{{ candlepin_container_tag }}
              sh -c "exit 0"
          register: _candlepin_allsecrets_test
          failed_when: false
          changed_when: false

        - name: DEBUG - Display all-secrets test result
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.debug:
            msg: >-
              All secrets test rc={{ _candlepin_allsecrets_test.rc }}:
              {{ (_candlepin_allsecrets_test.stderr_lines | default([]))
              + (_candlepin_allsecrets_test.stdout_lines | default([]))
              or ['(no output)'] }}

        # Run full container in foreground (no -d, no sdnotify) to capture app stdout/stderr.
        # Service fails with 125 because Podman waits for sdnotify; if the app exits first we see nothing.
        - name: DEBUG - Run full Candlepin container in foreground to capture startup output
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.shell:
            cmd: >-
              timeout 60 podman run --name candlepin-fg-debug --rm
              --cgroups=split --hostname {{ ansible_facts['fqdn'] }}
              {{ candlepin_networks | map('regex_replace', '^', '--network ') | join(' ') | trim }}
              -v /var/log/candlepin:/var/log/candlepin:Z
              -v /var/log/tomcat:/var/log/tomcat:Z
              --secret candlepin-ca-cert,target=/etc/candlepin/certs/candlepin-ca.crt,mode=0440,type=mount
              --secret candlepin-ca-key,target=/etc/candlepin/certs/candlepin-ca.key,mode=0440,type=mount
              --secret candlepin-tomcat-keystore,target=/etc/candlepin/certs/keystore,mode=0440,type=mount
              --secret candlepin-tomcat-truststore,target=/etc/candlepin/certs/truststore,mode=0440,type=mount
              --secret candlepin-candlepin-conf,target=/etc/candlepin/candlepin.conf,mode=0440,type=mount
              --secret candlepin-artemis-broker-xml,target=/etc/candlepin/broker.xml,mode=440,type=mount
              --secret candlepin-tomcat-server-xml,target=/etc/tomcat/server.xml,mode=440,type=mount
              --secret candlepin-tomcat-conf,target=/etc/tomcat/tomcat.conf,mode=440,type=mount
              --secret candlepin-artemis-login-config,target=/etc/tomcat/login.config,mode=440,type=mount
              --secret candlepin-artemis-cert-roles-properties,target=/etc/tomcat/cert-roles.properties,mode=440,type=mount
              --secret candlepin-artemis-cert-users-properties,target=/etc/tomcat/cert-users.properties,mode=440,type=mount
              --secret candlepin-artemis-jaas-conf,target=/etc/tomcat/conf.d/jaas.conf,mode=440,type=mount
              {{ candlepin_container_image }}:{{ candlepin_container_tag }}
          args:
            executable: /bin/bash
          register: _candlepin_fg_run
          failed_when: false
          changed_when: false

        - name: DEBUG - Display Candlepin foreground run output (rc={{ _candlepin_fg_run.rc }})
          when:
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.debug:
            msg: >-
              {{ (_candlepin_fg_run.stderr_lines | default([]))
              + (_candlepin_fg_run.stdout_lines | default([]))
              or ['(no output)'] }}

        - name: DEBUG - Get candlepin container logs (if container existed)
          ansible.builtin.command:
            cmd: podman logs candlepin --tail 100
          register: _candlepin_container_logs
          failed_when: false
          changed_when: false

        - name: DEBUG - Display candlepin container logs
          ansible.builtin.debug:
            msg: >-
              {{ ((_candlepin_container_logs.stdout_lines | default([]))
              + (_candlepin_container_logs.stderr_lines | default([])))
              or ['(container already removed or no output)'] }}

        # Run from container on Candlepin networks so "postgresql" hostname resolves
        # Only applicable when using bridge networks, not host networking
        - name: DEBUG - Test PostgreSQL TCP from Candlepin network (rescue)
          when:
            - database_mode == 'internal'
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.command:
            cmd: >-
              podman run --rm
              {{ candlepin_networks | map('regex_replace', '^', '--network ') | join(' ') | trim }}
              {{ postgresql_container_image }}:{{ postgresql_container_tag }}
              pg_isready -h {{ candlepin_database_host }} -p {{ candlepin_database_port }} -U postgres
          register: _candlepin_pg_rescue_test
          failed_when: false
          changed_when: false

        - name: DEBUG - Display PostgreSQL TCP test (rescue)
          when:
            - database_mode == 'internal'
            - candlepin_networks is iterable
            - candlepin_networks is not string
          ansible.builtin.debug:
            msg: >-
              PostgreSQL from Candlepin network (rescue):
              {{ 'SUCCESS' if _candlepin_pg_rescue_test.rc == 0 else 'FAILED' }}
              {{ (_candlepin_pg_rescue_test.stderr_lines + _candlepin_pg_rescue_test.stdout_lines) | default([]) }}

        - name: Re-raise the failure
          ansible.builtin.fail:
            msg: "Candlepin service failed to start"

    - name: Flush handlers to apply configuration changes
      ansible.builtin.meta: flush_handlers

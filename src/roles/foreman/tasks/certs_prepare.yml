---
# This file runs as ROOT to copy certificate files from /root/ or other locations
# that may only be accessible to root to /var/lib/foremanctl/tmp/
- name: Create temporary directory for certificates
  ansible.builtin.file:
    path: "/var/lib/{{ foremanctl_user }}/tmp"
    state: directory
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0755'

- name: Copy Foreman CA certificate to temporary directory
  ansible.builtin.copy:
    src: "{{ foreman_ca_certificate }}"
    dest: "/var/lib/{{ foremanctl_user }}/tmp/foreman-ca-cert.crt"
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0644'
    remote_src: true

- name: Copy Foreman client certificate to temporary directory
  ansible.builtin.copy:
    src: "{{ foreman_client_certificate }}"
    dest: "/var/lib/{{ foremanctl_user }}/tmp/foreman-client-cert.crt"
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0644'
    remote_src: true

- name: Copy Foreman client key to temporary directory
  ansible.builtin.copy:
    src: "{{ foreman_client_key }}"
    dest: "/var/lib/{{ foremanctl_user }}/tmp/foreman-client-key.key"
    owner: "{{ foremanctl_user }}"
    group: "{{ foremanctl_group }}"
    mode: '0600'
    remote_src: true
